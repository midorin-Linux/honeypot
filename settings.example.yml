env:
  # debug | info | warn | error
  log_level: info
  database_url: "honeypot.db"

  # 特別な理由がない限り、本番環境では有効(true)にしないでください。開発用にBANをせず、BAN判定の有無を返すだけになります。
  debug_mode: true

discord:
  token: YOUR_DISCORD_TOKEN_HERE

ai:
  # -----プロバイダー設定-----
  api_key: YOUR_API_KEY_HERE
  # https://api.openai.com/v1 -> https://api.openai.com/v1/models
  base_url: https://api.openai.com/v1
  model_id: gpt-oss-20b

  # AIプロバイダへのリクエストタイムアウト（秒）。ハング時に判定が無期限ブロックするのを防ぐ。デフォルト300
  request_timeout_secs: 300

  # -----モデル設定-----
  support_image: false

app:
  # AIにスパム判定をさせるかどうか。falseの場合、AI判定は行わず、ban_triggerの条件のみでBANを判断する
  enable_ai_judgment: true

  # ターゲットチャンネルに投稿したアカウントを、ban_triggerの条件やAI判定を一切問わず無条件でBANする。
  # 強力なため既定は無効(false)。有効(true)にすると他の条件より優先される。
  unconditional_ban: false

  # ハニーポットに使用するテキストチャンネルID
  honeypot_channel: 1520723308004380723

  # BAN時にさかのぼって削除するメッセージの日数（Discord仕様で0〜7）。
  delete_message_days: 3

  # 条件付きで即時BAN
  ban_trigger:
    # 招待リンクが含まれている場合( discord.gg/* | discord.com/invite/* | discordapp.com/invite/* )
    has_invite_link: true
    # 全体メンションまたはロールメンションが含まれている場合
    has_role_mention: true

    # メンション数の闘値(0でオフ)
    mention_threshold: 3