env:
  # debug | info | warn | error
  log_level: info

discord:
  token: YOUR_DISCORD_TOKEN_HERE

ai:
  # -----プロバイダー設定-----
  api_key: YOUR_API_KEY_HERE
  # https://api.openai.com/v1 -> https://api.openai.com/v1/models
  base_url: https://api.openai.com/v1
  model_id: gpt-oss-20b
  
  # -----モデル設定-----
  support_image: false

app:
  # AIにスパム判定をさせるかどうか。falseの場合、ターゲットチャンネルに投稿したアカウントを即時BANする
  enable_ai_judgment: true

  # 条件付きで即時BAN
  # 招待リンクが含まれている場合( discord.gg/* | discord.com/invite/* | discordapp.com/invite/* )
  has_invite_link: true
  # 全体メンションまたはロールメンションが含まれている場合
  has_role_mention: true

  # ハニーポットに使用するテキストチャンネルID
  honeypot_channel: 1520723308004380723