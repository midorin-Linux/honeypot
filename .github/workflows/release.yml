name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: honeypot

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""

    steps:
      - uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          out_dir="target/${{ matrix.target }}/release"
          pkg_name="${BIN_NAME}-${{ matrix.target }}"
          stage_dir="staging/${pkg_name}"
          mkdir -p "$stage_dir"

          cp "${out_dir}/${BIN_NAME}${{ matrix.ext }}" "$stage_dir/"
          cp "${out_dir}/README.md" "$stage_dir/"
          cp "${out_dir}/.env" "$stage_dir/"

          cd staging
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "${pkg_name}.zip" "${pkg_name}"
          else
            tar -czf "${pkg_name}.tar.gz" "${pkg_name}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            staging/*.zip
            staging/*.tar.gz
          if-no-files-found: error

  release:
    name: create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
